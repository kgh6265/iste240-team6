<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students | StudentPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            background-color: #F5F0E8;
            font-family: 'Georgia', serif;
            color: #3D2B1F;
        }
        .top-nav {
            background-color: #3D2B1F;
            padding: 0.8rem 2rem;
        }
        .top-nav .nav-link {
            color: #D4C5A9 !important;
            font-size: 0.95rem;
        }
        .top-nav .nav-link:hover {
            color: #ffffff !important;
        }
        .page-banner {
            background: linear-gradient(135deg, #3D2B1F, #6B4F35);
            color: #F5F0E8;
            padding: 2rem 2.5rem;
            border-radius: 14px;
            margin-bottom: 1.5rem;
        }
        .page-banner h3 {
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .page-banner small {
            opacity: 0.85;
        }
        .card {
            background: #FDFAF5;
            border: 1.5px solid #E8DECE;
            border-radius: 12px;
        }
        .table thead.table-dark th {
            background-color: #3D2B1F;
            color: #F5F0E8;
            border-color: #3D2B1F;
        }
        .table tbody tr:hover {
            background-color: #FFF8EE;
        }
        .table td {
            color: #3D2B1F;
            vertical-align: middle;
        }
        .form-control {
            background-color: #FDFAF5;
            border: 1.5px solid #E8DECE;
            color: #3D2B1F;
        }
        .form-control:focus {
            border-color: #8B7355;
            box-shadow: 0 0 0 0.2rem rgba(139, 115, 85, 0.2);
            background-color: #FDFAF5;
        }
        .btn-primary {
            background-color: #6B4F35;
            border-color: #6B4F35;
            color: #F5F0E8;
        }
        .btn-primary:hover {
            background-color: #3D2B1F;
            border-color: #3D2B1F;
        }
        .btn-warning {
            background-color: #C9A96E;
            border-color: #C9A96E;
            color: #3D2B1F;
        }
        .btn-warning:hover {
            background-color: #B8935A;
            border-color: #B8935A;
        }
        .modal-content {
            background-color: #FDFAF5;
            border: 1.5px solid #E8DECE;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark top-nav mb-4">
    <a class="navbar-brand fw-bold text-white" href="index.html">🎓 StudentPulse</a>
    <div class="d-flex gap-3">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link fw-bold text-white" href="students.html">Students</a>
        <a class="nav-link" href="events.html">Events</a>
        <a class="nav-link" href="comments.html">Comments</a>
    </div>
</nav>

<div class="container">

    <div class="page-banner">
        <h3 class="mb-0">👥 Students</h3>
        <small>View and manage all registered students</small>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <input type="text" id="searchInput" class="form-control w-50"
               placeholder="🔍 Search by name...">
        <button class="btn btn-primary" id="openAddModal">+ Add Student</button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>RIT ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="studentsTable">
                <tr><td colspan="6" class="text-center py-3">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="studentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Student</h5>
            </div>
            <div class="modal-body">
                <input type="text" id="ritId" placeholder="RIT ID" class="form-control mb-2">
                <input type="text" id="studentName" placeholder="Name" class="form-control mb-2">
                <input type="email" id="studentEmail" placeholder="Email" class="form-control mb-2">
                <input type="checkbox" id="studentActive" checked> Active
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="saveBtn">Save</button>
            </div>
        </div>
    </div>
</div>

<script>

    var API = '/api/students';
    var editingId = null;

    $(document).ready(function() {
        loadStudents();
    });

    function showMessage(msg) {
        alert(msg);
    }

    function loadStudents() {
        $.get(API, function(data) {
            renderTable(data);
        });
    }

    function renderTable(data) {
        let rows = "";
        data.forEach(s => {
            rows += `
        <tr>
            <td>${s.id}</td>
            <td>${s.ritId}</td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.active ? "Active" : "Inactive"}</td>
            <td>
                <button onclick="deleteStudent(${s.id})" class="btn btn-danger btn-sm">Delete</button>
            </td>
        </tr>`;
        });
        $("#studentsTable").html(rows);
    }

    function deleteStudent(id) {
        if (!confirm("Delete this student?")) return;

        $.ajax({
            method: "DELETE",
            url: API + "/" + id,
            success: function() {
                showMessage("Student deleted successfully");
                loadStudents();
            },
            error: function() {
                showMessage("Student not found or delete failed");
            }
        });
    }

    $("#saveBtn").click(function() {
        let student = {
            ritId: $("#ritId").val(),
            name: $("#studentName").val(),
            email: $("#studentEmail").val(),
            active: $("#studentActive").is(":checked")
        };

        $.ajax({
            method: "POST",
            url: API,
            contentType: "application/json",
            data: JSON.stringify(student),
            success: function() {
                showMessage("Student added successfully");
                loadStudents();
            },
            error: function() {
                showMessage("Error adding student");
            }
        });
    });

</script>

</body>
</html>
