<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events - StudentPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="container mt-4">

<h1 class="mb-4">📅 Campus Events</h1>

<div class="mb-3">
    <input type="text" id="searchInput" class="form-control w-50 d-inline" placeholder="Search by title...">
    <button class="btn btn-outline-primary" id="searchBtn">Search</button>
    <button class="btn btn-outline-secondary" id="clearBtn">Clear</button>
</div>

<div class="card mb-4">
    <div class="card-header bg-primary text-white">Add New Event</div>
    <div class="card-body">
        <input type="text" id="newTitle" class="form-control mb-2" placeholder="Title">
        <input type="text" id="newDescription" class="form-control mb-2" placeholder="Description">
        <input type="text" id="newCategory" class="form-control mb-2" placeholder="Category (e.g. Academic, SG, Social)">
        <select id="newStatus" class="form-select mb-2">
            <option value="PENDING">Pending</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="COMPLETED">Completed</option>
        </select>
        <button class="btn btn-primary" id="addBtn">Add Event</button>
    </div>
</div>

<div class="card mb-4" id="editCard" style="display:none;">
    <div class="card-header bg-warning">Edit Event</div>
    <div class="card-body">
        <input type="hidden" id="editId">
        <input type="text" id="editTitle" class="form-control mb-2" placeholder="Title">
        <input type="text" id="editDescription" class="form-control mb-2" placeholder="Description">
        <input type="text" id="editCategory" class="form-control mb-2" placeholder="Category">
        <select id="editStatus" class="form-select mb-2">
            <option value="PENDING">Pending</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="COMPLETED">Completed</option>
        </select>
        <button class="btn btn-warning" id="saveEditBtn">Save Changes</button>
        <button class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
    </div>
</div>

<div id="result"></div>

<script>
    var API = "/api/events";

    loadEvents();

    function loadEvents() {
        $.get(API, function(data) {
            renderTable(data);
        }).fail(function() {
            $("#result").html("<p class='text-danger'>Could not load events.</p>");
        });
    }

    function renderTable(data) {
        if (data.length === 0) {
            $("#result").html("<p class='text-muted'>No events found.</p>");
            return;
        }

        var table = "<table class='table table-bordered table-hover'>";
        table += "<thead class='table-dark'><tr><th>ID</th><th>Title</th><th>Description</th><th>Category</th><th>Status</th><th>Actions</th></tr></thead>";
        table += "<tbody>";

        for (var i = 0; i < data.length; i++) {
            var e = data[i];
            table += "<tr>";
            table += "<td>" + e.id + "</td>";
            table += "<td>" + e.title + "</td>";
            table += "<td>" + (e.description || "-") + "</td>";
            table += "<td>" + (e.category || "-") + "</td>";
            table += "<td>" + e.status + "</td>";
            table += `<td>
          <button class='btn btn-sm btn-warning me-1' onclick='openEdit(${e.id}, "${e.title}", "${e.description}", "${e.category}", "${e.status}")'>Edit</button>
          <button class='btn btn-sm btn-danger' onclick='deleteEvent(${e.id})'>Delete</button>
        </td>`;
            table += "</tr>";
        }

        table += "</tbody></table>";
        $("#result").html(table);
    }

    $("#addBtn").click(function() {
        var eventData = {
            title: $("#newTitle").val(),
            description: $("#newDescription").val(),
            category: $("#newCategory").val(),
            status: $("#newStatus").val()
        };

        if (!eventData.title) {
            alert("Title is required!");
            return;
        }

        $.ajax({
            url: API,
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(eventData),
            success: function() {
                alert("Event added!");
                $("#newTitle").val("");
                $("#newDescription").val("");
                $("#newCategory").val("");
                $("#newStatus").val("PENDING");
                loadEvents();
            },
            error: function() {
                alert("Failed to add event.");
            }
        });
    });

    function openEdit(id, title, description, category, status) {
        $("#editId").val(id);
        $("#editTitle").val(title);
        $("#editDescription").val(description);
        $("#editCategory").val(category);
        $("#editStatus").val(status);
        $("#editCard").show();
    }

    $("#cancelEditBtn").click(function() {
        $("#editCard").hide();
    });

    $("#saveEditBtn").click(function() {
        var id = $("#editId").val();
        var eventData = {
            title: $("#editTitle").val(),
            description: $("#editDescription").val(),
            category: $("#editCategory").val(),
            status: $("#editStatus").val()
        };

        $.ajax({
            url: API + "/" + id,
            type: "PUT",
            contentType: "application/json",
            data: JSON.stringify(eventData),
            success: function() {
                alert("Event updated!");
                $("#editCard").hide();
                loadEvents();
            },
            error: function() {
                alert("Failed to update event.");
            }
        });
    });

    function deleteEvent(id) {
        if (confirm("Are you sure you want to delete this event?")) {
            $.ajax({
                url: API + "/" + id,
                type: "DELETE",
                success: function() {
                    alert("Event deleted!");
                    loadEvents();
                },
                error: function() {
                    alert("Failed to delete event.");
                }
            });
        }
    }

    $("#searchBtn").click(function() {
        var keyword = $("#searchInput").val().trim();
        if (!keyword) { loadEvents(); return; }
        $.get(API + "/search?keyword=" + keyword, function(data) {
            renderTable(data);
        }).fail(function() {
            alert("Search failed.");
        });
    });

    $("#clearBtn").click(function() {
        $("#searchInput").val("");
        loadEvents();
    });

</script>
</body>
</html>
