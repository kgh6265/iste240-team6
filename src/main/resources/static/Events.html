<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - StudentPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            background-color: #F5F0E8;
            font-family: 'Georgia', serif;
            color: #3D2B1F;
        }
        .top-nav {
            background-color: #3D2B1F;
            padding: 0.8rem 2rem;
        }
        .top-nav .navbar-brand {
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }
        .top-nav .nav-link {
            color: #D4C5A9 !important;
            font-size: 0.95rem;
        }
        .top-nav .nav-link:hover {
            color: #ffffff !important;
        }
        .hero {
            background: linear-gradient(135deg, #3D2B1F, #6B4F35);
            color: #F5F0E8;
            padding: 3.5rem 3rem;
            border-radius: 14px;
            margin-bottom: 2.5rem;
        }
        .hero h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
        }
        .hero p {
            opacity: 0.88;
            font-size: 1rem;
            line-height: 1.7;
            margin: 0;
        }
        .section-label {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8B7355;
            margin-bottom: 1rem;
        }
        .card-custom {
            background: #FDFAF5;
            border-radius: 12px;
            padding: 1.6rem;
            border: 1.5px solid #E8DECE;
            margin-bottom: 2rem;
        }
        .form-control, .form-select {
            background-color: #FDFAF5;
            border: 1.5px solid #E8DECE;
            color: #3D2B1F;
            margin-bottom: 0.8rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #8B7355;
            box-shadow: none;
            background-color: #FFF8EE;
        }
        .btn-primary-custom {
            background-color: #3D2B1F;
            color: #F5F0E8;
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1.2rem;
        }
        .btn-primary-custom:hover {
            background-color: #6B4F35;
            color: #fff;
        }
        .btn-warning-custom {
            background-color: #8B7355;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.3rem 0.8rem;
            font-size: 0.85rem;
        }
        .btn-warning-custom:hover {
            background-color: #6B4F35;
            color: #fff;
        }
        .btn-danger-custom {
            background-color: #7A3B2E;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.3rem 0.8rem;
            font-size: 0.85rem;
        }
        .btn-danger-custom:hover {
            background-color: #5C2A1E;
            color: #fff;
        }
        table {
            background-color: #FDFAF5;
            border-radius: 12px;
            overflow: hidden;
        }
        thead {
            background-color: #3D2B1F;
            color: #F5F0E8;
        }
        tbody tr:hover {
            background-color: #FFF8EE;
        }
        .divider {
            border: none;
            border-top: 1.5px solid #E0D5C5;
            margin: 2rem 0;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark top-nav mb-4">
    <a class="navbar-brand fw-bold text-white" href="index.html">🎓 StudentPulse</a>
    <div class="d-flex gap-3">
        <a class="nav-link fw-bold" href="index.html">Home</a>
        <a class="nav-link" href="students.html">Students</a>
        <a class="nav-link" href="events.html">Events</a>
        <a class="nav-link" href="comments.html">Comments</a>
    </div>
</nav>

<div class="container">

    <div class="hero">
        <h2>📅 Campus Events</h2>
        <p>Browse, propose, and manage campus events at RIT Dubai.</p>
    </div>


    <p class="section-label">Search Events</p>
    <div class="card-custom">
        <div class="d-flex gap-2">
            <input type="text" id="searchInput" class="form-control" placeholder="Search by title...">
            <button class="btn btn-primary-custom" id="searchBtn">Search</button>
            <button class="btn btn-outline-secondary" id="clearBtn">Clear</button>
        </div>
    </div>

    <p class="section-label">Add New Event</p>
    <div class="card-custom">
        <input type="text" id="newTitle" class="form-control" placeholder="Title">
        <input type="text" id="newDescription" class="form-control" placeholder="Description">
        <input type="text" id="newCategory" class="form-control" placeholder="Category (e.g. Academic, SG, Social)">
        <select id="newStatus" class="form-select">
            <option value="PENDING">Pending</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="COMPLETED">Completed</option>
        </select>
        <button class="btn btn-primary-custom mt-2" id="addBtn">Add Event</button>
    </div>

    <div id="editCard" style="display:none;">
        <p class="section-label">Edit Event</p>
        <div class="card-custom">
            <input type="hidden" id="editId">
            <input type="text" id="editTitle" class="form-control" placeholder="Title">
            <input type="text" id="editDescription" class="form-control" placeholder="Description">
            <input type="text" id="editCategory" class="form-control" placeholder="Category">
            <select id="editStatus" class="form-select">
                <option value="PENDING">Pending</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="COMPLETED">Completed</option>
            </select>
            <div class="d-flex gap-2 mt-2">
                <button class="btn btn-primary-custom" id="saveEditBtn">Save Changes</button>
                <button class="btn btn-outline-secondary" id="cancelEditBtn">Cancel</button>
            </div>
        </div>
    </div>

    <hr class="divider">
    
    <p class="section-label">All Events</p>
    <div id="result"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var API = "/api/events";

    loadEvents();

    function loadEvents() {
        $.get(API, function(data) {
            renderTable(data);
        }).fail(function() {
            $("#result").html("<p class='text-danger'>Could not load events.</p>");
        });
    }

    function renderTable(data) {
        if (data.length === 0) {
            $("#result").html("<p class='text-muted'>No events found.</p>");
            return;
        }

        var table = "<table class='table table-bordered table-hover'>";
        table += "<thead><tr><th>ID</th><th>Title</th><th>Description</th><th>Category</th><th>Status</th><th>Actions</th></tr></thead>";
        table += "<tbody>";

        for (var i = 0; i < data.length; i++) {
            var e = data[i];
            table += "<tr>";
            table += "<td>" + e.id + "</td>";
            table += "<td>" + e.title + "</td>";
            table += "<td>" + (e.description || "-") + "</td>";
            table += "<td>" + (e.category || "-") + "</td>";
            table += "<td>" + e.status + "</td>";
            table += `<td>
        <button class='btn btn-warning-custom me-1' onclick='openEdit(${e.id}, "${e.title}", "${e.description}", "${e.category}", "${e.status}")'>Edit</button>
        <button class='btn btn-danger-custom' onclick='deleteEvent(${e.id})'>Delete</button>
      </td>`;
            table += "</tr>";
        }

        table += "</tbody></table>";
        $("#result").html(table);
    }

    $("#addBtn").click(function() {
        var eventData = {
            title: $("#newTitle").val(),
            description: $("#newDescription").val(),
            category: $("#newCategory").val(),
            status: $("#newStatus").val()
        };

        if (!eventData.title) {
            alert("Title is required!");
            return;
        }

        $.ajax({
            url: API,
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(eventData),
            success: function() {
                alert("Event added!");
                $("#newTitle").val("");
                $("#newDescription").val("");
                $("#newCategory").val("");
                $("#newStatus").val("PENDING");
                loadEvents();
            },
            error: function() {
                alert("Failed to add event.");
            }
        });
    });

    function openEdit(id, title, description, category, status) {
        $("#editId").val(id);
        $("#editTitle").val(title);
        $("#editDescription").val(description);
        $("#editCategory").val(category);
        $("#editStatus").val(status);
        $("#editCard").show();
        window.scrollTo(0, 0);
    }

    $("#cancelEditBtn").click(function() {
        $("#editCard").hide();
    });

    $("#saveEditBtn").click(function() {
        var id = $("#editId").val();
        var eventData = {
            title: $("#editTitle").val(),
            description: $("#editDescription").val(),
            category: $("#editCategory").val(),
            status: $("#editStatus").val()
        };

        $.ajax({
            url: API + "/" + id,
            type: "PUT",
            contentType: "application/json",
            data: JSON.stringify(eventData),
            success: function() {
                alert("Event updated!");
                $("#editCard").hide();
                loadEvents();
            },
            error: function() {
                alert("Failed to update event.");
            }
        });
    });

    function deleteEvent(id) {
        if (confirm("Are you sure you want to delete this event?")) {
            $.ajax({
                url: API + "/" + id,
                type: "DELETE",
                success: function() {
                    alert("Event deleted!");
                    loadEvents();
                },
                error: function() {
                    alert("Failed to delete event.");
                }
            });
        }
    }

    $("#searchBtn").click(function() {
        var keyword = $("#searchInput").val().trim();
        if (!keyword) { loadEvents(); return; }
        $.get(API + "/search?keyword=" + keyword, function(data) {
            renderTable(data);
        }).fail(function() {
            alert("Search failed.");
        });
    });

    $("#clearBtn").click(function() {
        $("#searchInput").val("");
        loadEvents();
    });
</script>
</body>
</html>
